sources:
  - name: jaffle_shop
    database: raw
    schema: jaffle_shop
    config:
      freshness:
        warn_after:
          count: 24
          period: hour
        error_after:
          count: 2
          period: day
      loaded_at_field: timestamp
    tables:
      - name: customers
        description: The grian of  this table is one customer per order
        config:
          freshness: null
        columns:
          - name: id
            description: id of an customer an primary key of customer table
            data_tests:
              - unique
              
      - name: orders
        description: one row per order
        config:
          freshness: null
